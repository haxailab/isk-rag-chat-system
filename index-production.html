<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISK RAG チャットシステム (Production)</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .chat-container {
            height: calc(100vh - 180px);
        }
        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        .version-badge {
            background: linear-gradient(45deg, #059669, #0d9488);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mx-auto mb-4"></div>
                <p class="text-gray-600">ISK RAG チャットシステムを読み込み中...</p>
            </div>
        </div>
    </div>

    <!-- AWS SDK -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1542.0.min.js"></script>
    <!-- Amazon Cognito Identity SDK -->
    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>

    <script>
        // AWS Cognito設定
        const CONFIG = {
            region: 'ap-northeast-1',
            userPoolId: 'ap-northeast-1_i2AeoNWra',
            userPoolClientId: '66d8jukea24p01u1bfrjmq01r0',
            apiGatewayUrl: 'https://ca65otj198.execute-api.ap-northeast-1.amazonaws.com/prod/'
        };

        // AWS設定
        AWS.config.region = CONFIG.region;

        // Cognito User Pool設定
        const poolData = {
            UserPoolId: CONFIG.userPoolId,
            ClientId: CONFIG.userPoolClientId
        };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        // JWT認証管理クラス
        class AuthManager {
            constructor() {
                this.currentUser = null;
                this.accessToken = null;
                this.idToken = null;
            }

            // ログイン
            signIn(username, password) {
                return new Promise((resolve, reject) => {
                    const authenticationData = {
                        Username: username,
                        Password: password,
                    };

                    const authenticationDetails = new AmazonCognitoIdentity.AuthenticationDetails(authenticationData);

                    const userData = {
                        Username: username,
                        Pool: userPool,
                    };

                    const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

                    cognitoUser.authenticateUser(authenticationDetails, {
                        onSuccess: (result) => {
                            console.log('Authentication successful:', result);

                            this.accessToken = result.getAccessToken().getJwtToken();
                            this.idToken = result.getIdToken().getJwtToken();
                            this.currentUser = cognitoUser;

                            // ユーザー情報を取得
                            const payload = result.getIdToken().payload;
                            const userInfo = {
                                username: payload['cognito:username'] || username,
                                email: payload.email,
                                name: payload.given_name || username,
                                sub: payload.sub
                            };

                            // ローカルストレージに保存
                            localStorage.setItem('access_token', this.accessToken);
                            localStorage.setItem('id_token', this.idToken);
                            localStorage.setItem('user_info', JSON.stringify(userInfo));

                            resolve(userInfo);
                        },
                        onFailure: (err) => {
                            console.error('Authentication failed:', err);
                            reject(err);
                        },
                        newPasswordRequired: (userAttributes, requiredAttributes) => {
                            console.log('New password required');
                            reject(new Error('新しいパスワードの設定が必要です'));
                        }
                    });
                });
            }

            // ログアウト
            signOut() {
                if (this.currentUser) {
                    this.currentUser.signOut();
                }

                this.currentUser = null;
                this.accessToken = null;
                this.idToken = null;

                localStorage.removeItem('access_token');
                localStorage.removeItem('id_token');
                localStorage.removeItem('user_info');
            }

            // 現在のユーザーを取得
            getCurrentUser() {
                // まずローカルストレージから復元を試みる
                const savedToken = localStorage.getItem('access_token');
                const savedUserInfo = localStorage.getItem('user_info');

                if (savedToken && savedUserInfo) {
                    this.accessToken = savedToken;
                    this.idToken = localStorage.getItem('id_token');
                    return JSON.parse(savedUserInfo);
                }

                return null;
            }

            // JWTトークンを取得 (API Gateway認証用にID Tokenを使用)
            getAccessToken() {
                return this.idToken || localStorage.getItem('id_token');
            }

            // 認証済みAPIリクエスト
            async authenticatedRequest(url, options = {}) {
                const token = this.getAccessToken();
                if (!token) {
                    throw new Error('認証トークンがありません');
                }

                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                };

                return fetch(url, {
                    ...options,
                    headers
                });
            }
        }

        // グローバル認証管理インスタンス
        const authManager = new AuthManager();

        // メインアプリケーション
        class App {
            constructor() {
                this.user = null;
                this.loading = true;
                this.messages = [];
                this.isLoading = false;

                this.init();
            }

            async init() {
                await this.checkAuthState();
                this.render();
            }

            async checkAuthState() {
                try {
                    this.user = authManager.getCurrentUser();
                } catch (error) {
                    console.error('Auth check error:', error);
                    this.user = null;
                }
                this.loading = false;
            }

            render() {
                const root = document.getElementById('root');

                if (this.loading) {
                    root.innerHTML = this.renderLoading();
                } else if (this.user) {
                    root.innerHTML = this.renderChat();
                    this.attachChatEventListeners();
                } else {
                    root.innerHTML = this.renderLogin();
                    this.attachLoginEventListeners();
                }
            }

            renderLoading() {
                return `
                    <div class="min-h-screen flex items-center justify-center">
                        <div class="text-center">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mx-auto mb-4"></div>
                            <p class="text-gray-600">認証状態を確認中...</p>
                        </div>
                    </div>
                `;
            }

            renderLogin() {
                return `
                    <div class="min-h-screen flex items-center justify-center">
                        <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow-md">
                            <div class="text-center">
                                <h2 class="text-2xl font-bold text-gray-900">ISK RAG チャットシステム</h2>
                                <div class="mt-2 version-badge text-white px-3 py-1 rounded-full text-sm inline-block">
                                    Production v1.0
                                </div>
                                <p class="mt-2 text-sm text-gray-600">
                                    🔐 JWT認証 + Claude Sonnet 4
                                </p>
                            </div>
                            <form id="loginForm" class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        ユーザー名
                                    </label>
                                    <input
                                        type="text"
                                        id="username"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                                        placeholder="Cognitoユーザー名"
                                        required
                                    />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">
                                        パスワード
                                    </label>
                                    <input
                                        type="password"
                                        id="password"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                                        placeholder="パスワード"
                                        required
                                    />
                                </div>
                                <div id="loginError" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"></div>
                                <button
                                    type="submit"
                                    id="loginButton"
                                    class="w-full py-2 px-4 bg-green-600 text-white rounded-md hover:bg-green-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
                                >
                                    ログイン
                                </button>
                            </form>
                            <div class="text-center">
                                <div class="bg-green-50 p-3 rounded-lg text-sm">
                                    <p class="font-medium text-green-800">🔐 セキュア認証</p>
                                    <p class="text-green-600 text-xs mt-1">JWTトークンによる認証が必要です</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderChat() {
                const messagesHtml = this.messages.map((message, index) => {
                    const justifyClass = message.type === 'user' ? 'justify-end' : 'justify-start';
                    let bubbleClass = '';

                    if (message.type === 'user') {
                        bubbleClass = 'bg-green-500 text-white';
                    } else if (message.type === 'error') {
                        bubbleClass = 'bg-red-100 text-red-800 border border-red-200';
                    } else {
                        bubbleClass = 'bg-white border border-gray-200 shadow-sm';
                    }

                    return `
                        <div class="flex ${justifyClass}">
                            <div class="message-bubble p-3 rounded-lg ${bubbleClass}">
                                <div class="whitespace-pre-line">${this.escapeHtml(message.content)}</div>
                                ${message.model ? `<div class="text-xs opacity-70 mt-1">モデル: ${message.model}</div>` : ''}
                                <div class="text-xs opacity-50 mt-1">${message.timestamp.toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                const loadingHtml = this.isLoading ? `
                    <div class="flex justify-start">
                        <div class="bg-gray-200 p-3 rounded-lg message-bubble">
                            <div class="flex items-center space-x-2">
                                <div class="animate-spin rounded-full h-4 w-4 border-2 border-green-500 border-t-transparent"></div>
                                <span>Claude Sonnet 4 が回答を生成中...</span>
                            </div>
                        </div>
                    </div>
                ` : '';

                const welcomeHtml = this.messages.length === 0 ? `
                    <div class="text-center text-gray-500 mt-8">
                        <div class="text-lg mb-2">🤖 ISK RAG アシスタント</div>
                        <div class="text-sm mb-4">Claude Sonnet 4 + JWT認証</div>
                        <div class="bg-green-50 p-4 rounded-lg max-w-md mx-auto">
                            <p class="text-green-800 text-sm font-medium">🔐 認証済み</p>
                            <p class="text-green-600 text-xs mt-1">
                                セキュアなJWTトークン認証でClaude Sonnet 4に接続中
                            </p>
                        </div>
                    </div>
                ` : '';

                return `
                    <div class="h-screen flex flex-col">
                        <!-- ヘッダー -->
                        <header class="bg-green-600 text-white p-4 flex justify-between items-center">
                            <div class="flex items-center space-x-4">
                                <h1 class="text-xl font-bold">ISK RAG チャットシステム</h1>
                                <div class="version-badge text-xs px-2 py-1 rounded-full bg-green-500">
                                    🔐 Production v1.0
                                </div>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-sm">👋 ${this.user.name || this.user.username}</span>
                                <button
                                    id="logoutButton"
                                    class="bg-green-500 hover:bg-green-700 px-4 py-2 rounded text-sm"
                                >
                                    ログアウト
                                </button>
                            </div>
                        </header>

                        <!-- チャットエリア -->
                        <div class="flex-1 chat-container overflow-y-auto p-4 space-y-4" id="chatArea">
                            ${welcomeHtml}
                            ${messagesHtml}
                            ${loadingHtml}
                        </div>

                        <!-- 入力エリア -->
                        <footer class="border-t bg-white p-4">
                            <form id="chatForm" class="flex space-x-2">
                                <input
                                    type="text"
                                    id="messageInput"
                                    placeholder="メッセージを入力してください..."
                                    class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500"
                                    ${this.isLoading ? 'disabled' : ''}
                                />
                                <button
                                    type="submit"
                                    id="sendButton"
                                    class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
                                    ${this.isLoading ? 'disabled' : ''}
                                >
                                    送信
                                </button>
                            </form>
                            <div class="text-xs text-gray-500 mt-2 text-center">
                                🔐 JWT認証 + Claude Sonnet 4 | Production Ready
                            </div>
                        </footer>
                    </div>
                `;
            }

            attachLoginEventListeners() {
                const form = document.getElementById('loginForm');
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.handleLogin();
                });
            }

            attachChatEventListeners() {
                const form = document.getElementById('chatForm');
                const logoutButton = document.getElementById('logoutButton');

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.handleSendMessage();
                });

                logoutButton.addEventListener('click', () => {
                    this.handleLogout();
                });
            }

            async handleLogin() {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const loginButton = document.getElementById('loginButton');
                const errorDiv = document.getElementById('loginError');

                if (!username || !password) return;

                loginButton.disabled = true;
                loginButton.textContent = 'ログイン中...';
                errorDiv.classList.add('hidden');

                try {
                    this.user = await authManager.signIn(username, password);
                    console.log('Login successful:', this.user);
                    this.render();
                } catch (error) {
                    console.error('Login error:', error);
                    let errorMessage = 'ログインに失敗しました。';

                    if (error.code === 'UserNotConfirmedException') {
                        errorMessage = 'アカウントが確認されていません。';
                    } else if (error.code === 'NotAuthorizedException') {
                        errorMessage = 'ユーザー名またはパスワードが正しくありません。';
                    } else if (error.code === 'UserNotFoundException') {
                        errorMessage = 'ユーザーが存在しません。';
                    } else if (error.message) {
                        errorMessage = error.message;
                    }

                    errorDiv.textContent = errorMessage;
                    errorDiv.classList.remove('hidden');
                } finally {
                    loginButton.disabled = false;
                    loginButton.textContent = 'ログイン';
                }
            }

            handleLogout() {
                authManager.signOut();
                this.user = null;
                this.messages = [];
                this.render();
            }

            async handleSendMessage() {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();

                if (!message || this.isLoading) return;

                // ユーザーメッセージを追加
                this.addMessage('user', message);
                input.value = '';
                this.isLoading = true;
                this.render();

                try {
                    console.log('Sending authenticated message:', message);

                    // JWT認証付きでChatAPIを呼び出し
                    const response = await authManager.authenticatedRequest(
                        `${CONFIG.apiGatewayUrl}chat`,
                        {
                            method: 'POST',
                            body: JSON.stringify({
                                message: message
                            })
                        }
                    );

                    console.log('Chat API Response:', response.status, response.statusText);

                    if (response.ok) {
                        const data = await response.json();
                        console.log('Chat API Data:', data);

                        const aiResponse = data.answer || 'Claude Sonnet 4から応答がありませんでした。';
                        this.addMessage('assistant', aiResponse, data.model || 'Claude Sonnet 4');
                    } else if (response.status === 401) {
                        // 認証エラーの場合はログアウト
                        this.addMessage('error', '認証エラーが発生しました。再度ログインしてください。');
                        setTimeout(() => this.handleLogout(), 2000);
                    } else {
                        const errorText = await response.text();
                        console.error('API Error:', response.status, errorText);
                        this.addMessage('error', `API呼び出しエラー (HTTP ${response.status}): ${errorText}`);
                    }
                } catch (error) {
                    console.error('Chat error:', error);
                    let errorMessage = `ネットワークエラー: ${error.message}`;

                    if (error.message.includes('認証トークン')) {
                        errorMessage = '認証トークンが無効です。再度ログインしてください。';
                        setTimeout(() => this.handleLogout(), 2000);
                    }

                    this.addMessage('error', errorMessage);
                }

                this.isLoading = false;
                this.render();
                this.scrollToBottom();
            }

            addMessage(type, content, model = null) {
                const message = {
                    type,
                    content,
                    model,
                    timestamp: new Date()
                };
                this.messages.push(message);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            scrollToBottom() {
                const chatArea = document.getElementById('chatArea');
                if (chatArea) {
                    chatArea.scrollTop = chatArea.scrollHeight;
                }
            }
        }

        // アプリケーション初期化
        document.addEventListener('DOMContentLoaded', () => {
            new App();
        });
    </script>
</body>
</html>
