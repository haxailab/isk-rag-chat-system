<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無機RAG - ISK AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --isk-red: #DC143C;
            --isk-red-dark: #B91C3C;
            --isk-red-light: #FEE2E2;
        }

        .chat-container {
            height: calc(100vh - 200px);
        }
        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        .isk-gradient {
            background: linear-gradient(135deg, var(--isk-red) 0%, var(--isk-red-dark) 100%);
        }

        .logo-main {
            height: 96px;
            max-width: 360px;
        }

        .logo-footer {
            height: 96px;
            max-width: 360px;
            opacity: 0.8;
        }

        .typing-indicator {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--isk-red);
            margin: 0 1px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .file-upload-area {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }
        .file-upload-area.dragover {
            border-color: var(--isk-red);
            background-color: var(--isk-red-light);
        }
    </style>
</head>
<body class="bg-white">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-gray-50">
            <div class="text-center">
                <div class="inline-block w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-gray-800">無機RAG システム読み込み中...</p>
            </div>
        </div>
    </div>

    <!-- AWS SDK -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1542.0.min.js"></script>
    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>

    <script>
        // AWS Cognito設定（現在の設定に更新）
        const CONFIG = {
            region: 'ap-northeast-1',
            userPoolId: 'ap-northeast-1_zG065zZXu',
            userPoolClientId: '320evpoao9264eh5ounfq8c313',
            apiGatewayUrl: 'https://s54esmcz1j.execute-api.ap-northeast-1.amazonaws.com/prod/',
            assetsUrl: 'https://d3hwl9tcru7yod.cloudfront.net/assets/'
        };

        // AWS設定
        AWS.config.region = CONFIG.region;

        // Cognito User Pool設定
        const poolData = {
            UserPoolId: CONFIG.userPoolId,
            ClientId: CONFIG.userPoolClientId
        };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        // JWT認証管理クラス
        class AuthManager {
            constructor() {
                this.currentUser = null;
                this.accessToken = null;
                this.idToken = null;
            }

            // ログイン
            signIn(username, password) {
                return new Promise((resolve, reject) => {
                    const authenticationData = {
                        Username: username,
                        Password: password,
                    };

                    const authenticationDetails = new AmazonCognitoIdentity.AuthenticationDetails(authenticationData);

                    const userData = {
                        Username: username,
                        Pool: userPool,
                    };

                    const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

                    cognitoUser.authenticateUser(authenticationDetails, {
                        onSuccess: (result) => {
                            console.log('Authentication successful:', result);

                            this.accessToken = result.getAccessToken().getJwtToken();
                            this.idToken = result.getIdToken().getJwtToken();
                            this.currentUser = cognitoUser;

                            // ユーザー情報を取得
                            const payload = result.getIdToken().payload;
                            const userInfo = {
                                username: payload['cognito:username'] || username,
                                email: payload.email,
                                name: payload.given_name || username,
                                sub: payload.sub
                            };

                            // ローカルストレージに保存
                            localStorage.setItem('access_token', this.accessToken);
                            localStorage.setItem('id_token', this.idToken);
                            localStorage.setItem('user_info', JSON.stringify(userInfo));

                            resolve(userInfo);
                        },
                        onFailure: (err) => {
                            console.error('Authentication failed:', err);
                            reject(err);
                        },
                        newPasswordRequired: (userAttributes, requiredAttributes) => {
                            console.log('New password required');
                            reject(new Error('新しいパスワードの設定が必要です'));
                        }
                    });
                });
            }

            // ログアウト
            signOut() {
                if (this.currentUser) {
                    this.currentUser.signOut();
                }

                this.currentUser = null;
                this.accessToken = null;
                this.idToken = null;

                localStorage.removeItem('access_token');
                localStorage.removeItem('id_token');
                localStorage.removeItem('user_info');
            }

            // 現在のユーザーを取得
            getCurrentUser() {
                const savedToken = localStorage.getItem('id_token');
                const savedUserInfo = localStorage.getItem('user_info');

                if (savedToken && savedUserInfo) {
                    this.accessToken = localStorage.getItem('access_token');
                    this.idToken = savedToken;
                    return JSON.parse(savedUserInfo);
                }

                return null;
            }

            // JWTトークンを取得 (API Gateway認証用にID Tokenを使用)
            getAccessToken() {
                return this.idToken || localStorage.getItem('id_token');
            }

            // 認証済みAPIリクエスト
            async authenticatedRequest(url, options = {}) {
                const token = this.getAccessToken();
                if (!token) {
                    throw new Error('認証トークンがありません');
                }

                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                };

                return fetch(url, {
                    ...options,
                    headers
                });
            }
        }

        // グローバル認証管理インスタンス
        const authManager = new AuthManager();

        // メインアプリケーション
        class App {
            constructor() {
                this.user = null;
                this.loading = true;
                this.messages = [];
                this.isLoading = false;
                this.currentSession = null;
                this.sessionFiles = [];
                this.dragOver = false;

                this.init();
            }

            async init() {
                await this.checkAuthState();
                this.render();
            }

            async checkAuthState() {
                try {
                    this.user = authManager.getCurrentUser();
                } catch (error) {
                    console.error('Auth check error:', error);
                    this.user = null;
                }
                this.loading = false;
            }

            render() {
                const root = document.getElementById('root');

                if (this.loading) {
                    root.innerHTML = this.renderLoading();
                } else if (this.user) {
                    root.innerHTML = this.renderChat();
                    this.attachChatEventListeners();
                } else {
                    root.innerHTML = this.renderLogin();
                    this.attachLoginEventListeners();
                }
            }

            renderLoading() {
                return `
                    <div class="min-h-screen flex items-center justify-center bg-gray-50">
                        <div class="text-center">
                            <div class="inline-block w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p class="text-gray-800">無機RAG システムを読み込み中...</p>
                        </div>
                    </div>
                `;
            }

            renderLogin() {
                return `
                    <div class="min-h-screen bg-white flex items-center justify-center">
                        <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-xl shadow-lg border border-gray-200">
                            <!-- Header with Title -->
                            <div class="text-center space-y-4">
                                <h2 class="text-4xl font-bold text-black">無機RAG</h2>
                                <p class="text-gray-600">ISK社内向け高性能AIチャットシステム</p>
                                <p class="text-sm text-gray-500">Local Insight, Global Impact</p>
                            </div>

                            <form id="loginForm" class="space-y-6">
                                <div>
                                    <label class="block text-sm font-medium text-black mb-2">
                                        メールアドレス
                                    </label>
                                    <input
                                        type="email"
                                        id="username"
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                        placeholder="your-email@isk.com"
                                        required
                                    />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-black mb-2">
                                        パスワード
                                    </label>
                                    <input
                                        type="password"
                                        id="password"
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                        placeholder="パスワード"
                                        required
                                    />
                                </div>
                                <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg"></div>
                                <button
                                    type="submit"
                                    id="loginButton"
                                    class="w-full py-3 px-4 text-white rounded-lg hover:opacity-90 disabled:bg-gray-400 disabled:cursor-not-allowed transition-all isk-gradient"
                                >
                                    ログイン
                                </button>
                            </form>
                        </div>
                    </div>
                `;
            }

            renderChat() {
                const messagesHtml = this.messages.map((msg, index) => `
                    <div class="flex ${msg.type === 'user' ? 'justify-end' : 'justify-start'}">
                        <div class="message-bubble p-4 rounded-lg ${
                            msg.type === 'user'
                                ? 'text-white isk-gradient'
                                : msg.type === 'error'
                                ? 'bg-red-100 text-red-800 border border-red-300'
                                : msg.type === 'system'
                                ? 'bg-green-100 text-green-800 border border-green-300'
                                : 'bg-white border border-gray-200 shadow-sm'
                        }">
                            <div class="whitespace-pre-wrap">${msg.content}</div>
                            ${msg.model && msg.type === 'assistant' ? `<div class="text-xs opacity-70 mt-2">${msg.model}</div>` : ''}
                            <div class="text-xs opacity-50 mt-2">${msg.timestamp.toLocaleTimeString()}</div>
                        </div>
                    </div>
                `).join('');

                const loadingHtml = this.isLoading ? `
                    <div class="flex justify-start">
                        <div class="bg-gray-200 p-4 rounded-lg max-w-md">
                            <div class="flex items-center space-x-2">
                                <div class="typing-indicator"></div>
                                <div class="typing-indicator"></div>
                                <div class="typing-indicator"></div>
                                <span class="ml-2">無機RAGが回答中...</span>
                            </div>
                        </div>
                    </div>
                ` : '';

                const sessionFilesHtml = this.sessionFiles.length > 0 ? `
                    <div class="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                        <h4 class="text-sm font-medium text-blue-800 mb-2">📄 アップロード済みファイル (${this.sessionFiles.length})</h4>
                        <div class="space-y-1">
                            ${this.sessionFiles.map(file => `
                                <div class="text-xs text-blue-700">
                                    • ${file.filename} (${Math.round(file.size / 1024)}KB) - ${file.processing_status === 'ready' ? '処理済み' : '処理中'}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : '';

                return `
                    <div class="min-h-screen bg-gray-50 flex flex-col">
                        <!-- Header -->
                        <header class="isk-gradient text-white p-6 shadow-md">
                            <div class="max-w-6xl mx-auto flex justify-between items-center">
                                <div>
                                    <h1 class="text-2xl font-bold">無機RAG - ISK AI Assistant</h1>
                                    <p class="text-sm opacity-80">ファイルアップロード対応版 | Local Insight, Global Impact</p>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <span class="text-sm">ユーザー: ${this.user.name || this.user.username}</span>
                                    <button
                                        id="logoutButton"
                                        class="px-4 py-2 bg-white bg-opacity-20 rounded-lg hover:bg-opacity-30 transition-all"
                                    >
                                        ログアウト
                                    </button>
                                </div>
                            </div>
                        </header>

                        <!-- Chat Area -->
                        <div class="flex-1 chat-container overflow-y-auto p-6 space-y-4 bg-white ${this.dragOver ? 'file-upload-area dragover' : ''}"
                             id="chatArea">

                            ${sessionFilesHtml}
                            ${messagesHtml}
                            ${loadingHtml}
                        </div>

                        <!-- Input Area -->
                        <footer class="border-t border-gray-200 bg-white p-6 shadow-lg">
                            <form id="chatForm" class="flex space-x-3 max-w-6xl mx-auto">
                                <!-- File Upload Button -->
                                <label class="cursor-pointer">
                                    <input
                                        type="file"
                                        id="fileInput"
                                        multiple
                                        accept=".pdf,.txt,.md,.csv,.json,.png,.jpg,.jpeg,.gif,.docx,.xlsx,.pptx"
                                        class="hidden"
                                    />
                                    <div class="flex items-center space-x-2 px-3 py-3 bg-gray-100 border border-gray-300 rounded-lg hover:bg-gray-200 text-sm">
                                        <span>📎</span>
                                        <span>ファイル</span>
                                    </div>
                                </label>

                                <input
                                    type="text"
                                    id="messageInput"
                                    placeholder="無機RAGに質問やお手伝いを依頼してください..."
                                    class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                    ${this.isLoading ? 'disabled' : ''}
                                />
                                <button
                                    type="submit"
                                    id="sendButton"
                                    class="px-6 py-3 text-white rounded-lg hover:opacity-90 disabled:bg-gray-400 disabled:cursor-not-allowed transition-all isk-gradient"
                                    ${this.isLoading ? 'disabled' : ''}
                                >
                                    送信
                                </button>
                            </form>

                            <div class="text-xs text-gray-500 text-center mt-2">
                                💡 ファイルをドラッグ&ドロップするか、📎ボタンでアップロード | Local Insight, Global Impact
                            </div>

                            <!-- ISK Logo at bottom -->
                            <div class="flex justify-center mt-6 pt-4 border-t border-gray-200">
                                <img src="${CONFIG.assetsUrl}isk-logo.png" alt="ISK Logo" class="logo-footer" style="height: 80px; max-width: 300px; opacity: 0.9;">
                            </div>

                        </footer>
                    </div>
                `;
            }

            attachLoginEventListeners() {
                const form = document.getElementById('loginForm');
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.handleLogin();
                });
            }

            attachChatEventListeners() {
                const form = document.getElementById('chatForm');
                const logoutButton = document.getElementById('logoutButton');
                const fileInput = document.getElementById('fileInput');
                const chatArea = document.getElementById('chatArea');

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.handleSendMessage();
                });

                logoutButton.addEventListener('click', () => {
                    this.handleLogout();
                });

                fileInput.addEventListener('change', (e) => {
                    this.handleFileUpload(e.target.files);
                });

                // ドラッグ&ドロップのイベントリスナーを追加
                let dragLeaveTimer = null;
                let dragOverTimer = null;

                // ウィンドウ全体でのドラッグイベントを監視
                document.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!this.dragOver) {
                        this.dragOver = true;
                        this.updateDragOverlay();
                    }
                    // タイマーをクリア（まだウィンドウ内にいる）
                    if (dragLeaveTimer) {
                        clearTimeout(dragLeaveTimer);
                        dragLeaveTimer = null;
                    }

                    // dragoverタイマーをリセット（安全策として）
                    if (dragOverTimer) {
                        clearTimeout(dragOverTimer);
                    }
                    dragOverTimer = setTimeout(() => {
                        // 300ms間dragoverイベントが発生しない場合はオーバーレイを隠す
                        if (this.dragOver) {
                            this.dragOver = false;
                            this.updateDragOverlay();
                        }
                        dragOverTimer = null;
                    }, 300);
                });

                document.addEventListener('dragenter', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                });

                document.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    // ウィンドウの境界を越えた場合の判定（より確実な方法）
                    const isOutsideWindow = (
                        e.clientX < 0 ||                    // 左境界
                        e.clientX > window.innerWidth ||    // 右境界
                        e.clientY < 0 ||                    // 上境界
                        e.clientY > window.innerHeight      // 下境界
                    );

                    // relatedTargetがnullまたはウィンドウ外の座標の場合
                    if (e.relatedTarget === null || isOutsideWindow) {
                        // 短い遅延を設けてからオーバーレイを隠す
                        if (dragLeaveTimer) {
                            clearTimeout(dragLeaveTimer);
                        }
                        dragLeaveTimer = setTimeout(() => {
                            if (this.dragOver) {
                                this.dragOver = false;
                                this.updateDragOverlay();
                            }
                            dragLeaveTimer = null;
                        }, 100); // 100ms の遅延（右側境界での安定性向上）
                    }
                });

                document.addEventListener('drop', (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    // 全てのタイマーをクリア
                    if (dragLeaveTimer) {
                        clearTimeout(dragLeaveTimer);
                        dragLeaveTimer = null;
                    }
                    if (dragOverTimer) {
                        clearTimeout(dragOverTimer);
                        dragOverTimer = null;
                    }

                    this.dragOver = false;
                    this.updateDragOverlay();

                    // ファイルがドロップされた場合のみアップロード処理
                    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                        const files = e.dataTransfer.files;
                        this.handleFileUpload(files);
                    }
                });
            }

            async handleLogin() {
                const email = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const loginButton = document.getElementById('loginButton');
                const errorDiv = document.getElementById('loginError');

                if (!email || !password) return;

                loginButton.disabled = true;
                loginButton.innerHTML = '<div class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></div>認証中...';
                errorDiv.classList.add('hidden');

                try {
                    // メールアドレスでログイン試行
                    this.user = await authManager.signIn(email, password);
                    console.log('Login successful:', this.user);

                    // ウェルカムメッセージを追加
                    this.messages = [{
                        type: 'system',
                        content: `🎉 ようこそ、${this.user.name || this.user.username}さん！\n\n無機RAG - ISK AI Assistant へログインしました。\n\n• ファイルをドラッグ&ドロップしてアップロード可能\n• Knowledge Base + アップロードファイルのハイブリッド検索\n• 「メモを要約して」などの自然な質問に対応\n\n「Local Insight, Global Impact」の精神で、最高のサポートを提供します。`,
                        timestamp: new Date()
                    }];

                    this.render();
                } catch (error) {
                    console.error('Login error:', error);
                    let errorMessage = 'ログインに失敗しました。';

                    if (error.code === 'UserNotConfirmedException') {
                        errorMessage = 'アカウントが確認されていません。管理者にお問い合わせください。';
                    } else if (error.code === 'NotAuthorizedException') {
                        errorMessage = 'メールアドレスまたはパスワードが正しくありません。\n\nテスト用: test@isk.com / ISKTest2024!';
                    } else if (error.code === 'UserNotFoundException') {
                        errorMessage = 'ユーザーが存在しません。\n\nテスト用メールアドレス: test@isk.com';
                    } else if (error.message) {
                        errorMessage = `認証エラー: ${error.message}`;
                    }

                    errorDiv.textContent = errorMessage;
                    errorDiv.classList.remove('hidden');
                } finally {
                    loginButton.disabled = false;
                    loginButton.textContent = 'ログイン';
                }
            }

            handleLogout() {
                authManager.signOut();
                this.user = null;
                this.messages = [];
                this.currentSession = null;
                this.sessionFiles = [];
                this.dragOver = false;

                // ドラッグオーバーレイをクリーンアップ
                const existingOverlay = document.getElementById('dragOverlay');
                if (existingOverlay) {
                    existingOverlay.remove();
                }

                this.render();
            }

            // ドラッグオーバーレイの表示/非表示を切り替え（ちらつき防止）
            updateDragOverlay() {
                const existingOverlay = document.getElementById('dragOverlay');

                if (this.dragOver) {
                    // オーバーレイが存在しない場合のみ作成
                    if (!existingOverlay) {
                        const overlay = document.createElement('div');
                        overlay.id = 'dragOverlay';
                        overlay.className = 'fixed inset-0 flex items-center justify-center z-50 pointer-events-none';
                        overlay.style.cssText = 'background-color: rgba(220, 20, 60, 0.1); backdrop-filter: blur(2px);';

                        overlay.innerHTML = `
                            <div class="text-center p-8 rounded-xl" style="background-color: rgba(220, 20, 60, 0.95); color: white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);">
                                <div class="text-6xl mb-4">📁</div>
                                <div class="text-3xl font-bold mb-2">ファイルをここにドロップ</div>
                                <div class="text-lg opacity-90">PDF, 画像, Office文書, テキストファイルに対応</div>
                                <div class="text-sm mt-2 opacity-75">ドラッグしたファイルを離してください</div>
                            </div>
                        `;

                        document.body.appendChild(overlay);
                    }
                } else {
                    // オーバーレイを削除
                    if (existingOverlay) {
                        existingOverlay.remove();
                    }
                }
            }

            // ファイルアップロード処理
            async handleFileUpload(files) {
                if (!files || files.length === 0) return;

                console.log('ファイルアップロード開始:', files);

                try {
                    const fileArray = Array.from(files);

                    // ファイルをBase64に変換
                    const filesData = await Promise.all(
                        fileArray.map(file => {
                            return new Promise((resolve, reject) => {
                                const reader = new FileReader();
                                reader.onload = (e) => {
                                    const base64Content = e.target.result.split(',')[1];
                                    resolve({
                                        filename: file.name,
                                        content: base64Content,
                                        contentType: file.type
                                    });
                                };
                                reader.onerror = reject;
                                reader.readAsDataURL(file);
                            });
                        })
                    );

                    // 認証付きファイルアップロード
                    const response = await authManager.authenticatedRequest(`${CONFIG.apiGatewayUrl}/file-upload`, {
                        method: 'POST',
                        body: JSON.stringify({
                            files: filesData
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`アップロードエラー: ${response.status}`);
                    }

                    const data = await response.json();

                    console.log('✅ ファイルアップロード成功:', data);

                    // セッションIDを設定
                    if (data.session_id) {
                        this.currentSession = data.session_id;
                    }

                    // ファイル一覧を更新
                    if (data.uploaded_files) {
                        this.sessionFiles = [...this.sessionFiles, ...data.uploaded_files];
                    }

                    // 成功メッセージを表示
                    this.messages.push({
                        type: 'system',
                        content: `✅ ${data.uploaded_files?.length || fileArray.length}個のファイルがアップロードされました！\n\nセッション: ${data.session_id}\n\n${data.uploaded_files?.map(f => `• ${f.filename} (${f.processing_status})`).join('\n') || ''}`,
                        timestamp: new Date()
                    });

                    this.render();

                } catch (error) {
                    console.error('ファイルアップロードエラー:', error);

                    this.messages.push({
                        type: 'error',
                        content: `ファイルアップロードに失敗しました: ${error.message}`,
                        timestamp: new Date()
                    });

                    this.render();
                }
            }


            async handleSendMessage() {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();

                if (!message || this.isLoading) return;

                // ユーザーメッセージを追加
                this.messages.push({
                    type: 'user',
                    content: message,
                    timestamp: new Date()
                });

                input.value = '';
                this.isLoading = true;
                this.render();

                try {
                    // 拡張チャットまたは通常チャット
                    const endpoint = this.currentSession ? 'enhanced-chat' : 'chat';
                    const requestBody = this.currentSession
                        ? {
                            message: message,
                            session_id: this.currentSession,
                            use_session_files: true
                          }
                        : {
                            message: message
                          };

                    console.log(`📡 認証付き ${endpoint} エンドポイント使用:`, requestBody);

                    const response = await authManager.authenticatedRequest(`${CONFIG.apiGatewayUrl}/${endpoint}`, {
                        method: 'POST',
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) {
                        throw new Error(`API エラー: ${response.status}`);
                    }

                    const data = await response.json();

                    // AIメッセージを追加
                    this.messages.push({
                        type: 'assistant',
                        content: data.answer,
                        model: data.model || 'Unknown Model',
                        sources: data.sources || [],
                        timestamp: new Date()
                    });

                } catch (error) {
                    console.error('Message error:', error);

                    this.messages.push({
                        type: 'error',
                        content: `エラー: ${error.message}`,
                        timestamp: new Date()
                    });
                }

                this.isLoading = false;
                this.render();

                // チャットエリアを下にスクロール
                setTimeout(() => {
                    const chatArea = document.getElementById('chatArea');
                    chatArea.scrollTop = chatArea.scrollHeight;
                }, 100);
            }
        }

        // アプリケーション初期化
        const app = new App();
        console.log('✅ 無機RAG システム（元デザイン+ファイル対応）初期化完了');
    </script>
</body>
</html>
