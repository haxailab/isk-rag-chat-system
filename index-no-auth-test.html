<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISK RAG チャットシステム (Claude接続テスト)</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .chat-container {
            height: calc(100vh - 180px);
        }
        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        .version-badge {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root">
        <div class="h-screen flex flex-col">
            <!-- ヘッダー -->
            <header className="bg-orange-600 text-white p-4 flex justify-between items-center">
                <div className="flex items-center space-x-4">
                    <h1 className="text-xl font-bold">ISK RAG チャットシステム</h1>
                    <div className="version-badge text-xs px-2 py-1 rounded-full text-white">
                        Claude接続テスト版 (認証なし)
                    </div>
                </div>
                <div className="flex items-center space-x-4">
                    <span className="text-sm">テストユーザー</span>
                    <div className="bg-yellow-500 text-xs px-2 py-1 rounded text-black">認証回避中</div>
                </div>
            </header>

            <!-- チャットエリア -->
            <div className="flex-1 chat-container overflow-y-auto p-4 space-y-4" id="chatArea">
                <div className="text-center text-gray-500 mt-8">
                    <div className="text-lg mb-2">🚧 Claude Sonnet 4 接続テスト</div>
                    <div className="text-sm mb-4">
                        認証機能は一時的に無効化されています
                    </div>
                    <div className="bg-yellow-50 p-4 rounded-lg max-w-md mx-auto">
                        <p className="text-yellow-800 text-sm font-medium">⚠️ テスト版の注意</p>
                        <p className="text-yellow-600 text-xs mt-1">
                            この版は認証なしでAPIを呼び出します。本番では必ず認証を有効化してください。
                        </p>
                    </div>
                </div>
            </div>

            <!-- 入力エリア -->
            <footer className="border-t bg-white p-4">
                <form id="chatForm" className="flex space-x-2">
                    <input
                        type="text"
                        id="messageInput"
                        placeholder="Claude Sonnet 4 にメッセージを送信（認証なしテスト）..."
                        className="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-500"
                    />
                    <button
                        type="submit"
                        id="sendButton"
                        className="px-6 py-2 bg-orange-600 text-white rounded-md hover:bg-orange-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
                    >
                        送信
                    </button>
                </form>
                <div className="text-xs text-gray-500 mt-2 text-center">
                    🚧 テスト版: 認証なし Claude 接続 | 本番では認証機能を有効化します
                </div>
            </footer>
        </div>
    </div>

    <script>
        const CONFIG = {
            apiGatewayUrl: 'https://jztwgpdqe8.execute-api.ap-northeast-1.amazonaws.com/prod/'
        };

        let messages = [];
        let isLoading = false;

        function addMessage(type, content, model = null) {
            const timestamp = new Date();
            const message = { type, content, model, timestamp };
            messages.push(message);
            renderMessages();
        }

        function renderMessages() {
            const chatArea = document.getElementById('chatArea');

            if (messages.length === 0) {
                chatArea.innerHTML = `
                    <div class="text-center text-gray-500 mt-8">
                        <div class="text-lg mb-2">🚧 Claude Sonnet 4 接続テスト</div>
                        <div class="text-sm mb-4">認証機能は一時的に無効化されています</div>
                        <div class="bg-yellow-50 p-4 rounded-lg max-w-md mx-auto">
                            <p class="text-yellow-800 text-sm font-medium">⚠️ テスト版の注意</p>
                            <p class="text-yellow-600 text-xs mt-1">
                                この版は認証なしでAPIを呼び出します。本番では必ず認証を有効化してください。
                            </p>
                        </div>
                    </div>
                `;
                return;
            }

            let html = '';
            messages.forEach((message, index) => {
                const justifyClass = message.type === 'user' ? 'justify-end' : 'justify-start';
                let bubbleClass = '';

                if (message.type === 'user') {
                    bubbleClass = 'bg-orange-500 text-white';
                } else if (message.type === 'error') {
                    bubbleClass = 'bg-red-100 text-red-800 border border-red-200';
                } else {
                    bubbleClass = 'bg-white border border-gray-200 shadow-sm';
                }

                html += `
                    <div class="flex ${justifyClass}">
                        <div class="message-bubble p-3 rounded-lg ${bubbleClass}">
                            <div class="whitespace-pre-line">${escapeHtml(message.content)}</div>
                            ${message.model ? `<div class="text-xs opacity-70 mt-1">モデル: ${message.model}</div>` : ''}
                            <div class="text-xs opacity-50 mt-1">${message.timestamp.toLocaleTimeString()}</div>
                        </div>
                    </div>
                `;
            });

            if (isLoading) {
                html += `
                    <div class="flex justify-start">
                        <div class="bg-gray-200 p-3 rounded-lg message-bubble">
                            <div class="flex items-center space-x-2">
                                <div class="animate-spin rounded-full h-4 w-4 border-2 border-orange-500 border-t-transparent"></div>
                                <span>Claude Sonnet 4 が回答を生成中...</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            chatArea.innerHTML = html;
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage(message) {
            if (!message.trim() || isLoading) return;

            addMessage('user', message);
            isLoading = true;
            renderMessages();

            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            messageInput.disabled = true;
            sendButton.disabled = true;

            try {
                console.log('Sending message to Chat API (NO AUTH):', message);

                // 認証なしで /test-chat エンドポイントを呼び出し
                const response = await fetch(`${CONFIG.apiGatewayUrl}test-chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                        // 認証ヘッダーを意図的に省略
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });

                console.log('Chat API Response:', response.status, response.statusText);

                if (response.ok) {
                    const data = await response.json();
                    console.log('Chat API Data:', data);

                    const aiResponse = data.answer || 'Claude Sonnet 4から応答がありませんでした。';
                    addMessage('assistant', aiResponse, data.model || 'Claude Sonnet 4');
                } else {
                    const errorText = await response.text();
                    console.error('API Error:', response.status, errorText);

                    let errorMessage = '';
                    if (response.status === 401) {
                        errorMessage = `🔐 認証エラー (HTTP 401)

このテスト版では認証ヘッダーを送信していないため、API Gatewayが認証エラーを返しています。

これは正常な動作です！次のステップで認証機能を実装します。

エラー詳細:
- ステータス: ${response.status} ${response.statusText}
- メッセージ: "${message}"
- API URL: ${CONFIG.apiGatewayUrl}chat

✅ Claude接続は正常（認証が必要）`;
                    } else {
                        errorMessage = `API呼び出しエラー (HTTP ${response.status})

詳細: ${errorText}

デバッグ情報:
- URL: ${CONFIG.apiGatewayUrl}chat
- メッセージ: "${message}"`;
                    }

                    addMessage('error', errorMessage);
                }
            } catch (error) {
                console.error('Network error:', error);
                addMessage('error', `ネットワークエラー: ${error.message}

接続先: ${CONFIG.apiGatewayUrl}chat
送信メッセージ: "${message}"

ネットワーク接続を確認してください。`);
            }

            isLoading = false;
            messageInput.disabled = false;
            sendButton.disabled = false;
            renderMessages();
        }

        // イベントリスナー設定
        document.addEventListener('DOMContentLoaded', function() {
            const chatForm = document.getElementById('chatForm');
            const messageInput = document.getElementById('messageInput');

            chatForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const message = messageInput.value.trim();
                if (message) {
                    messageInput.value = '';
                    sendMessage(message);
                }
            });

            // 初期表示
            renderMessages();

            // テスト用の自動メッセージ
            setTimeout(() => {
                addMessage('assistant', `🚧 Claude Sonnet 4 接続テスト版へようこそ！

この版では以下をテストできます:
✅ フロントエンドの動作
✅ API Gateway への接続
✅ エラーハンドリング

🔐 認証機能について:
現在、認証ヘッダーなしでAPIを呼び出しているため、
HTTP 401エラーが返される予定です。

これは正常な動作で、次のステップで本格的な認証機能を実装します。

何かメッセージを送信してテストしてみてください！`, 'システム');
            }, 1000);
        });
    </script>
</body>
</html>
