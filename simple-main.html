<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISK RAG チャットシステム - 簡易版</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .message-bubble {
            max-width: 70%;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root">
        <div class="min-h-screen bg-gray-50">
            <!-- ヘッダー -->
            <header class="bg-blue-600 text-white p-4">
                <div class="flex justify-between items-center max-w-6xl mx-auto">
                    <h1 class="text-2xl font-bold">🧪 ISK RAG チャットシステム（簡易版）</h1>
                    <div class="text-sm">診断モード</div>
                </div>
            </header>

            <!-- メイン画面 -->
            <div class="max-w-6xl mx-auto p-6">
                <div class="bg-white rounded-lg shadow-sm border p-6 mb-6">
                    <h2 class="text-lg font-semibold mb-4">🔧 システム診断結果</h2>

                    <div class="space-y-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                            <span>CloudFront配信: 正常</span>
                        </div>

                        <div class="flex items-center space-x-3" id="api-status">
                            <div class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></div>
                            <span>API接続: 確認中...</span>
                        </div>

                        <div class="flex items-center space-x-3" id="auth-status">
                            <div class="w-3 h-3 bg-yellow-500 rounded-full animate-pulse"></div>
                            <span>認証システム: 確認中...</span>
                        </div>
                    </div>
                </div>

                <!-- 簡易チャット -->
                <div class="bg-white rounded-lg shadow-sm border">
                    <div class="p-4 border-b">
                        <h3 class="font-semibold">💬 簡易チャット（認証なし）</h3>
                        <p class="text-sm text-gray-600">本格版はこの後実装します</p>
                    </div>

                    <div class="h-96 overflow-y-auto p-4" id="chat-messages">
                        <div class="text-center text-gray-500">
                            メッセージを入力してください...
                        </div>
                    </div>

                    <div class="p-4 border-t">
                        <form id="chat-form" class="flex space-x-2">
                            <input
                                type="text"
                                id="message-input"
                                placeholder="メッセージを入力..."
                                class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                            <button
                                type="submit"
                                class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700"
                            >
                                送信
                            </button>
                        </form>
                    </div>
                </div>

                <!-- 次のステップ -->
                <div class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <h4 class="font-semibold text-blue-800 mb-2">📋 次のステップ</h4>
                    <p class="text-blue-700 text-sm mb-3">この簡易版で基本動作を確認した後、以下を実装します：</p>
                    <ul class="text-blue-700 text-sm space-y-1">
                        <li>• Cognito認証システム</li>
                        <li>• ファイルアップロード機能</li>
                        <li>• 拡張RAGチャット</li>
                        <li>• ChatGPTライクなUI</li>
                    </ul>
                    <button onclick="loadFullVersion()" class="mt-3 px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">
                        本格版を読み込む（React版）
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('🚀 簡易版ISK RAGシステム開始');

        // API状態確認
        async function checkAPIStatus() {
            try {
                const response = await fetch('https://s54esmcz1j.execute-api.ap-northeast-1.amazonaws.com/prod/health');
                const data = await response.json();

                document.getElementById('api-status').innerHTML =
                    '<div class="w-3 h-3 bg-green-500 rounded-full"></div>' +
                    '<span>API接続: 正常 (' + data.status + ')</span>';

                console.log('✅ API接続正常', data);
            } catch (error) {
                document.getElementById('api-status').innerHTML =
                    '<div class="w-3 h-3 bg-red-500 rounded-full"></div>' +
                    '<span>API接続: エラー (' + error.message + ')</span>';

                console.error('❌ API接続エラー', error);
            }
        }

        // 認証システム確認（仮）
        async function checkAuthStatus() {
            document.getElementById('auth-status').innerHTML =
                '<div class="w-3 h-3 bg-green-500 rounded-full"></div>' +
                '<span>認証システム: スキップ（簡易版）</span>';
        }

        // チャット機能
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;

            const messagesDiv = document.getElementById('chat-messages');

            // ユーザーメッセージを表示
            messagesDiv.innerHTML +=
                '<div class="flex justify-end mb-4">' +
                    '<div class="message-bubble bg-blue-500 text-white p-3 rounded-lg">' +
                        message +
                    '</div>' +
                '</div>';

            input.value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // 「入力中」表示
            messagesDiv.innerHTML +=
                '<div class="flex justify-start mb-4" id="thinking">' +
                    '<div class="bg-gray-200 p-3 rounded-lg">' +
                        '<div class="flex items-center space-x-2">' +
                            '<div class="animate-spin rounded-full h-4 w-4 border-2 border-blue-500 border-t-transparent"></div>' +
                            '<span>無機RAGが回答中...</span>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch('https://s54esmcz1j.execute-api.ap-northeast-1.amazonaws.com/prod/test-chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // 「入力中」を削除
                document.getElementById('thinking').remove();

                // AI回答を表示
                messagesDiv.innerHTML +=
                    '<div class="flex justify-start mb-4">' +
                        '<div class="message-bubble bg-white border p-3 rounded-lg">' +
                            '<div class="whitespace-pre-wrap">' + data.answer + '</div>' +
                            '<div class="text-xs text-gray-500 mt-2">' +
                                (data.model || 'Unknown Model') + ' • ' + new Date().toLocaleTimeString() +
                            '</div>' +
                        '</div>' +
                    '</div>';
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                console.log('✅ チャット成功', data);

            } catch (error) {
                // 「入力中」を削除
                if (document.getElementById('thinking')) {
                    document.getElementById('thinking').remove();
                }

                // エラーメッセージを表示
                messagesDiv.innerHTML +=
                    '<div class="flex justify-start mb-4">' +
                        '<div class="bg-red-100 border border-red-300 text-red-800 p-3 rounded-lg">' +
                            'エラー: ' + error.message +
                        '</div>' +
                    '</div>';
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                console.error('❌ チャットエラー', error);
            }
        });

        // 本格版読み込み関数
        function loadFullVersion() {
            if (confirm('本格版（React + Cognito認証 + ファイルアップロード）を読み込みますか？\n\n問題が発生した場合は F12 で開発者ツールを開いて確認してください。')) {
                window.location.href = '/index.html'; // 元のReact版に戻る
            }
        }

        // 初期化
        checkAPIStatus();
        checkAuthStatus();

        console.log('✅ 簡易版ISK RAGシステム初期化完了');
    </script>
</body>
</html>
