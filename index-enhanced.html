<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無機RAG Enhanced - ISK AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --isk-red: #DC143C;
            --isk-red-dark: #B91C3C;
            --isk-red-light: #FEE2E2;
        }

        .chat-container {
            height: calc(100vh - 200px);
        }
        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        .isk-gradient {
            background: linear-gradient(135deg, var(--isk-red) 0%, var(--isk-red-dark) 100%);
        }

        .logo-main {
            height: 96px;
            max-width: 360px;
        }

        .logo-footer {
            height: 96px;
            max-width: 360px;
            opacity: 0.8;
        }

        .typing-indicator {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: var(--isk-red);
            margin: 0 1px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ファイルアップロード関連のスタイル */
        .file-drop-zone {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }
        .file-drop-zone.drag-over {
            border-color: var(--isk-red);
            background-color: var(--isk-red-light);
        }

        .file-preview {
            max-width: 200px;
            max-height: 150px;
            object-fit: cover;
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        .sidebar {
            width: 300px;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .file-attachment {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border: 1px solid #cbd5e1;
        }
    </style>
</head>
<body class="bg-white">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-gray-50">
            <div class="text-center">
                <div class="inline-block w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-gray-800">無機RAG Enhanced システム読み込み中...</p>
            </div>
        </div>
    </div>

    <!-- AWS SDK -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1542.0.min.js"></script>
    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>

    <script>
        // AWS Cognito設定
        const CONFIG = {
            region: 'ap-northeast-1',
            userPoolId: 'ap-northeast-1_i2AeoNWra',
            userPoolClientId: '66d8jukea24p01u1bfrjmq01r0',
            apiGatewayUrl: 'https://ca65otj198.execute-api.ap-northeast-1.amazonaws.com/prod/',
            assetsUrl: 'https://d3hwl9tcru7yod.cloudfront.net/assets/'
        };

        // AWS設定
        AWS.config.region = CONFIG.region;

        // Cognito User Pool設定
        const poolData = {
            UserPoolId: CONFIG.userPoolId,
            ClientId: CONFIG.userPoolClientId
        };
        const userPool = new AmazonCognitoIdentity.CognitoUserPool(poolData);

        // セッション管理クラス
        class SessionManager {
            constructor() {
                this.currentSession = null;
                this.uploadedFiles = [];
            }

            createNewSession(sessionName = null) {
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                const uniqueId = Math.random().toString(36).substr(2, 8);

                this.currentSession = {
                    id: null, // サーバーで生成される
                    name: sessionName || `セッション-${timestamp}`,
                    created: new Date(),
                    files: []
                };

                this.uploadedFiles = [];
                return this.currentSession;
            }

            addFile(fileInfo) {
                if (this.currentSession) {
                    this.currentSession.files.push(fileInfo);
                }
                this.uploadedFiles.push(fileInfo);
            }

            removeFile(fileId) {
                if (this.currentSession) {
                    this.currentSession.files = this.currentSession.files.filter(f => f.file_id !== fileId);
                }
                this.uploadedFiles = this.uploadedFiles.filter(f => f.file_id !== fileId);
            }

            getCurrentSession() {
                return this.currentSession;
            }
        }

        // JWT認証管理クラス（既存のものを拡張）
        class AuthManager {
            constructor() {
                this.currentUser = null;
                this.accessToken = null;
                this.idToken = null;
            }

            // ログイン
            signIn(username, password) {
                return new Promise((resolve, reject) => {
                    const authenticationData = {
                        Username: username,
                        Password: password,
                    };

                    const authenticationDetails = new AmazonCognitoIdentity.AuthenticationDetails(authenticationData);

                    const userData = {
                        Username: username,
                        Pool: userPool,
                    };

                    const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

                    cognitoUser.authenticateUser(authenticationDetails, {
                        onSuccess: (result) => {
                            console.log('Authentication successful:', result);

                            this.accessToken = result.getAccessToken().getJwtToken();
                            this.idToken = result.getIdToken().getJwtToken();
                            this.currentUser = cognitoUser;

                            // ユーザー情報を取得
                            const payload = result.getIdToken().payload;
                            const userInfo = {
                                username: payload['cognito:username'] || username,
                                email: payload.email,
                                name: payload.given_name || username,
                                sub: payload.sub
                            };

                            // ローカルストレージに保存
                            localStorage.setItem('access_token', this.accessToken);
                            localStorage.setItem('id_token', this.idToken);
                            localStorage.setItem('user_info', JSON.stringify(userInfo));

                            resolve(userInfo);
                        },
                        onFailure: (err) => {
                            console.error('Authentication failed:', err);
                            reject(err);
                        },
                        newPasswordRequired: (userAttributes, requiredAttributes) => {
                            console.log('New password required');
                            reject(new Error('新しいパスワードの設定が必要です'));
                        }
                    });
                });
            }

            // ログアウト
            signOut() {
                if (this.currentUser) {
                    this.currentUser.signOut();
                }

                this.currentUser = null;
                this.accessToken = null;
                this.idToken = null;

                localStorage.removeItem('access_token');
                localStorage.removeItem('id_token');
                localStorage.removeItem('user_info');
            }

            // 現在のユーザーを取得
            getCurrentUser() {
                const savedToken = localStorage.getItem('id_token');
                const savedUserInfo = localStorage.getItem('user_info');

                if (savedToken && savedUserInfo) {
                    this.accessToken = localStorage.getItem('access_token');
                    this.idToken = savedToken;
                    return JSON.parse(savedUserInfo);
                }

                return null;
            }

            // JWTトークンを取得 (API Gateway認証用にID Tokenを使用)
            getAccessToken() {
                return this.idToken || localStorage.getItem('id_token');
            }

            // 認証済みAPIリクエスト
            async authenticatedRequest(url, options = {}) {
                const token = this.getAccessToken();
                if (!token) {
                    throw new Error('認証トークンがありません');
                }

                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                };

                return fetch(url, {
                    ...options,
                    headers
                });
            }

            // ファイルアップロード用
            async uploadFiles(files, sessionName = null) {
                const token = this.getAccessToken();
                if (!token) {
                    throw new Error('認証トークンがありません');
                }

                // ファイルをBase64エンコード
                const encodedFiles = await Promise.all(
                    Array.from(files).map(async (file) => {
                        const base64 = await this.fileToBase64(file);
                        return {
                            filename: file.name,
                            content: base64.split(',')[1], // "data:type;base64,"を除去
                            contentType: file.type,
                            size: file.size
                        };
                    })
                );

                const response = await fetch(`${CONFIG.apiGatewayUrl}upload`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        files: encodedFiles,
                        session_name: sessionName
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Upload failed: ${response.status} ${errorText}`);
                }

                return response.json();
            }

            // ファイルをBase64に変換
            fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }
        }

        // グローバルインスタンス
        const authManager = new AuthManager();
        const sessionManager = new SessionManager();

        // メインアプリケーション（拡張版）
        class App {
            constructor() {
                this.user = null;
                this.loading = true;
                this.messages = [];
                this.isLoading = false;
                this.sidebarOpen = true;
                this.dragCounter = 0;

                this.init();
            }

            async init() {
                await this.checkAuthState();
                this.render();
            }

            async checkAuthState() {
                try {
                    this.user = authManager.getCurrentUser();
                    if (this.user) {
                        // 新しいセッションを作成
                        sessionManager.createNewSession();
                    }
                } catch (error) {
                    console.error('Auth check error:', error);
                    this.user = null;
                }
                this.loading = false;
            }

            render() {
                const root = document.getElementById('root');

                if (this.loading) {
                    root.innerHTML = this.renderLoading();
                } else if (this.user) {
                    root.innerHTML = this.renderChat();
                    this.attachChatEventListeners();
                    this.setupFileUploadListeners();
                } else {
                    root.innerHTML = this.renderLogin();
                    this.attachLoginEventListeners();
                }
            }

            renderLoading() {
                return `
                    <div class="min-h-screen flex items-center justify-center bg-gray-50">
                        <div class="text-center">
                            <div class="inline-block w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                            <p class="text-gray-800">無機RAG Enhanced システムを読み込み中...</p>
                        </div>
                    </div>
                `;
            }

            renderLogin() {
                return `
                    <div class="min-h-screen bg-white flex items-center justify-center">
                        <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-xl shadow-lg border border-gray-200">
                            <!-- Header with Title -->
                            <div class="text-center space-y-4">
                                <h2 class="text-4xl font-bold text-black">無機RAG</h2>
                                <p class="text-gray-600">ISK社内向け高性能AIチャットシステム</p>
                                <div class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded">Enhanced Version - ファイルアップロード対応</div>
                            </div>

                            <form id="loginForm" class="space-y-6">
                                <div>
                                    <label class="block text-sm font-medium text-black mb-2">
                                        ユーザー名
                                    </label>
                                    <input
                                        type="text"
                                        id="username"
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                        placeholder="Cognitoユーザー名"
                                        required
                                    />
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-black mb-2">
                                        パスワード
                                    </label>
                                    <input
                                        type="password"
                                        id="password"
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                        placeholder="パスワード"
                                        required
                                    />
                                </div>
                                <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg"></div>
                                <button
                                    type="submit"
                                    id="loginButton"
                                    class="w-full py-3 px-4 text-white rounded-lg hover:opacity-90 disabled:bg-gray-400 disabled:cursor-not-allowed transition-all isk-gradient"
                                >
                                    ログイン
                                </button>
                            </form>

                            <!-- ISK Logo -->
                            <div class="flex justify-center pt-6 border-t border-gray-100">
                                <img src="${CONFIG.assetsUrl}isk-logo.png" alt="ISK" class="logo-main mx-auto opacity-80">
                            </div>
                        </div>
                    </div>
                `;
            }

            renderChat() {
                // メッセージ表示HTML
                const messagesHtml = this.messages.map((message, index) => {
                    const justifyClass = message.type === 'user' ? 'justify-end' : 'justify-start';
                    let bubbleClass = '';

                    if (message.type === 'user') {
                        bubbleClass = 'text-white isk-gradient';
                    } else if (message.type === 'error') {
                        bubbleClass = 'bg-red-50 text-red-800 border border-red-200';
                    } else {
                        bubbleClass = 'bg-gray-100 border border-gray-200 text-black';
                    }

                    // ファイル添付の表示
                    let attachmentHtml = '';
                    if (message.attachments && message.attachments.length > 0) {
                        const attachmentsList = message.attachments.map(file =>
                            `<div class="flex items-center space-x-2 p-2 bg-gray-50 rounded border mb-2">
                                <span class="text-lg">${this.getFileIcon(file.filename)}</span>
                                <div class="flex-1 min-w-0">
                                    <div class="text-sm font-medium text-gray-900 truncate">${file.filename}</div>
                                    <div class="text-xs text-gray-500">${this.formatFileSize(file.size)}</div>
                                </div>
                            </div>`
                        ).join('');

                        attachmentHtml = `
                            <div class="mt-2">
                                <div class="text-xs font-semibold text-gray-700 mb-1">📎 添付ファイル</div>
                                ${attachmentsList}
                            </div>`;
                    }

                    // ソースリンクの生成
                    let sourceLinksHtml = '';
                    if (message.sourceLinks && message.sourceLinks.length > 0) {
                        const linksHtml = message.sourceLinks.map(link =>
                            `<a href="${link.url}" target="_blank" class="text-red-600 hover:text-red-800 underline text-xs block">📄 ${link.filename}</a>`
                        ).join('');

                        sourceLinksHtml = `
                            <div class="mt-3 p-2 bg-red-50 rounded border-l-4 border-red-600">
                                <div class="text-xs font-semibold text-red-700 mb-1">📚 参考文書 (ISK社内文書)</div>
                                ${linksHtml}
                            </div>`;
                    }

                    // RAG/一般知識の表示
                    let knowledgeTypeHtml = '';
                    if (message.type === 'assistant') {
                        if (message.isRag) {
                            knowledgeTypeHtml = '<span class="inline-block bg-red-100 text-red-700 text-xs px-2 py-1 rounded mt-2">🔍 社内文書参照</span>';
                        } else {
                            knowledgeTypeHtml = '<span class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-1 rounded mt-2">🧠 一般知識</span>';
                        }
                    }

                    return `
                        <div class="flex ${justifyClass}">
                            <div class="message-bubble p-4 rounded-xl ${bubbleClass}">
                                ${attachmentHtml}
                                <div class="whitespace-pre-line">${this.escapeHtml(message.content)}</div>
                                ${sourceLinksHtml}
                                ${message.model ? `<div class="text-xs opacity-70 mt-2">モデル: ${message.model}</div>` : ''}
                                ${knowledgeTypeHtml}
                                <div class="text-xs opacity-50 mt-1">${message.timestamp.toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                const loadingHtml = this.isLoading ? `
                    <div class="flex justify-start">
                        <div class="bg-gray-100 p-4 rounded-xl message-bubble border border-gray-200">
                            <div class="flex items-center space-x-3">
                                <div class="flex space-x-1">
                                    <div class="typing-indicator"></div>
                                    <div class="typing-indicator"></div>
                                    <div class="typing-indicator"></div>
                                </div>
                                <span class="text-sm text-gray-600">無機RAGが回答を生成中...</span>
                            </div>
                        </div>
                    </div>
                ` : '';

                return `
                    <div class="h-screen flex bg-white">
                        <!-- Sidebar -->
                        <div class="sidebar bg-gray-50 border-r border-gray-200 overflow-y-auto ${this.sidebarOpen ? '' : 'collapsed'}">
                            ${this.renderSidebar()}
                        </div>

                        <!-- Main Chat Area -->
                        <div class="flex-1 flex flex-col">
                            <!-- Header -->
                            <header class="text-white p-4 shadow-lg isk-gradient">
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center space-x-4">
                                        <button id="sidebarToggle" class="text-white hover:bg-white hover:bg-opacity-20 p-2 rounded">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                                            </svg>
                                        </button>
                                        <div class="text-xl font-bold">無機RAG Enhanced</div>
                                        <div class="px-3 py-1 bg-white bg-opacity-20 rounded-full text-xs">
                                            Claude Sonnet 4.6
                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-6">
                                        <div class="text-right">
                                            <span class="text-sm">👋 ${this.user.name || this.user.username}</span>
                                            <div class="text-xs opacity-90">ISK Member</div>
                                        </div>
                                        <button
                                            id="logoutButton"
                                            class="bg-white bg-opacity-20 hover:bg-opacity-30 px-4 py-2 rounded-lg text-sm transition-all"
                                        >
                                            ログアウト
                                        </button>
                                    </div>
                                </div>
                            </header>

                            <!-- Chat Area with Drag & Drop Support -->
                            <div class="flex-1 chat-container overflow-y-auto p-6 space-y-4 bg-white file-drop-zone" id="chatArea">
                                ${messagesHtml}
                                ${loadingHtml}
                            </div>

                            <!-- Input Area with File Upload -->
                            <footer class="border-t border-gray-200 bg-white p-6 shadow-lg">
                                <!-- Upload Progress (Hidden by default) -->
                                <div id="uploadProgress" class="hidden mb-4">
                                    <div class="bg-gray-200 rounded-full h-2">
                                        <div id="uploadProgressBar" class="progress-bar bg-red-600 h-2 rounded-full" style="width: 0%"></div>
                                    </div>
                                    <div class="text-xs text-gray-600 mt-1" id="uploadStatus">ファイルをアップロード中...</div>
                                </div>

                                <!-- File Preview Area -->
                                <div id="filePreview" class="hidden mb-4">
                                    <div class="text-xs font-semibold text-gray-700 mb-2">📎 アップロード予定ファイル:</div>
                                    <div id="fileList" class="space-y-2"></div>
                                </div>

                                <form id="chatForm" class="flex space-x-3">
                                    <div class="flex-1 relative">
                                        <input
                                            type="text"
                                            id="messageInput"
                                            placeholder="無機RAGに質問やお手伝いを依頼してください... (ファイルをドラッグ&ドロップも可能)"
                                            class="w-full pl-4 pr-12 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500"
                                            ${this.isLoading ? 'disabled' : ''}
                                        />
                                        <button
                                            type="button"
                                            id="fileButton"
                                            class="absolute right-2 top-2 p-2 text-gray-400 hover:text-red-600 rounded-lg hover:bg-gray-100"
                                            title="ファイルを添付"
                                        >
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
                                            </svg>
                                        </button>
                                        <input type="file" id="fileInput" multiple accept=".txt,.pdf,.docx,.xlsx,.pptx,.png,.jpg,.jpeg,.csv,.json" class="hidden" />
                                    </div>
                                    <button
                                        type="submit"
                                        id="sendButton"
                                        class="px-6 py-3 text-white rounded-lg hover:opacity-90 disabled:bg-gray-400 disabled:cursor-not-allowed transition-all isk-gradient"
                                        ${this.isLoading ? 'disabled' : ''}
                                    >
                                        送信
                                    </button>
                                </form>

                                <!-- ISK Logo at bottom -->
                                <div class="flex justify-center mt-4 pt-3 border-t border-gray-100">
                                    <img src="${CONFIG.assetsUrl}isk-logo.png" alt="ISK" class="logo-footer">
                                </div>
                            </footer>
                        </div>
                    </div>
                `;
            }

            renderSidebar() {
                const session = sessionManager.getCurrentSession();
                const uploadedFiles = sessionManager.uploadedFiles;

                return `
                    <div class="p-4 space-y-4">
                        <!-- Current Session -->
                        <div class="space-y-3">
                            <div class="flex items-center justify-between">
                                <h3 class="font-semibold text-gray-800 text-sm">現在のセッション</h3>
                                <button id="newSessionBtn" class="text-xs text-red-600 hover:text-red-800" title="新しいセッション">
                                    ➕
                                </button>
                            </div>
                            <div class="bg-white rounded-lg p-3 border border-gray-200">
                                <div class="text-sm font-medium text-gray-900" id="sessionName" contenteditable="true">
                                    ${session ? session.name : 'デフォルトセッション'}
                                </div>
                                <div class="text-xs text-gray-500 mt-1">
                                    ファイル数: ${uploadedFiles.length}件
                                </div>
                                ${session ? `<div class="text-xs text-gray-500">作成: ${session.created.toLocaleString()}</div>` : ''}
                            </div>
                        </div>

                        <!-- Session Files -->
                        <div class="space-y-3">
                            <h3 class="font-semibold text-gray-800 text-sm">セッション内ファイル</h3>
                            <div class="space-y-2 max-h-64 overflow-y-auto" id="sessionFiles">
                                ${uploadedFiles.length > 0 ?
                                    uploadedFiles.map(file => `
                                        <div class="bg-white rounded-lg p-3 border border-gray-200 flex items-center space-x-3">
                                            <span class="text-lg">${this.getFileIcon(file.filename)}</span>
                                            <div class="flex-1 min-w-0">
                                                <div class="text-sm font-medium text-gray-900 truncate">${file.filename}</div>
                                                <div class="text-xs text-gray-500">${this.formatFileSize(file.size || 0)}</div>
                                            </div>
                                            <button class="text-red-600 hover:text-red-800 text-sm" onclick="app.removeFile('${file.file_id}')">
                                                🗑️
                                            </button>
                                        </div>
                                    `).join('')
                                    :
                                    '<div class="text-sm text-gray-500 italic">ファイルがありません</div>'
                                }
                            </div>
                        </div>

                        <!-- System Controls -->
                        <div class="space-y-3 pt-4 border-t border-gray-200">
                            <h3 class="font-semibold text-gray-800 text-sm">システム</h3>
                            <div class="space-y-2">
                                <button id="settingsBtn" class="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg flex items-center space-x-2">
                                    <span>⚙️</span>
                                    <span>設定</span>
                                </button>
                                <button id="sidebarLogoutBtn" class="w-full text-left px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg flex items-center space-x-2">
                                    <span>🚪</span>
                                    <span>ログアウト</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 各種イベントリスナー設定
            attachLoginEventListeners() {
                const form = document.getElementById('loginForm');
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.handleLogin();
                });
            }

            attachChatEventListeners() {
                const form = document.getElementById('chatForm');
                const logoutButton = document.getElementById('logoutButton');
                const sidebarLogoutBtn = document.getElementById('sidebarLogoutBtn');
                const sidebarToggle = document.getElementById('sidebarToggle');
                const newSessionBtn = document.getElementById('newSessionBtn');

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.handleSendMessage();
                });

                logoutButton?.addEventListener('click', () => this.handleLogout());
                sidebarLogoutBtn?.addEventListener('click', () => this.handleLogout());

                sidebarToggle?.addEventListener('click', () => {
                    this.sidebarOpen = !this.sidebarOpen;
                    this.render();
                });

                newSessionBtn?.addEventListener('click', () => {
                    const sessionName = prompt('新しいセッション名を入力してください:', `セッション-${new Date().toLocaleTimeString()}`);
                    if (sessionName) {
                        sessionManager.createNewSession(sessionName);
                        this.render();
                    }
                });
            }

            setupFileUploadListeners() {
                const chatArea = document.getElementById('chatArea');
                const fileButton = document.getElementById('fileButton');
                const fileInput = document.getElementById('fileInput');

                // ドラッグ&ドロップ
                chatArea?.addEventListener('dragenter', (e) => {
                    e.preventDefault();
                    this.dragCounter++;
                    chatArea.classList.add('drag-over');
                });

                chatArea?.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    this.dragCounter--;
                    if (this.dragCounter === 0) {
                        chatArea.classList.remove('drag-over');
                    }
                });

                chatArea?.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });

                chatArea?.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.dragCounter = 0;
                    chatArea.classList.remove('drag-over');
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        this.handleFilesSelected(files);
                    }
                });

                // ファイルボタン
                fileButton?.addEventListener('click', () => {
                    fileInput.click();
                });

                fileInput?.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        this.handleFilesSelected(e.target.files);
                        e.target.value = ''; // Reset input
                    }
                });
            }

            // ファイル処理メソッド
            async handleFilesSelected(files) {
                if (!files || files.length === 0) return;

                console.log('Files selected:', files.length);

                // ファイル検証
                const validFiles = Array.from(files).filter(file => {
                    const maxSize = 50 * 1024 * 1024; // 50MB
                    if (file.size > maxSize) {
                        alert(`ファイル "${file.name}" が大きすぎます (最大: 50MB)`);
                        return false;
                    }
                    return true;
                });

                if (validFiles.length === 0) return;

                try {
                    // プログレス表示開始
                    this.showUploadProgress();

                    // ファイルアップロード
                    const session = sessionManager.getCurrentSession();
                    const uploadResult = await authManager.uploadFiles(validFiles, session?.name);

                    console.log('Upload result:', uploadResult);

                    // セッション情報更新
                    if (!session?.id) {
                        sessionManager.currentSession.id = uploadResult.session_id;
                        sessionManager.currentSession.name = uploadResult.session_name || session?.name;
                    }

                    // アップロードしたファイルを記録
                    uploadResult.uploaded_files.forEach(file => {
                        sessionManager.addFile(file);
                    });

                    // プログレス非表示
                    this.hideUploadProgress();

                    // UI更新
                    this.render();

                    // 成功メッセージ
                    this.addMessage('system', `📎 ${uploadResult.uploaded_files.length}件のファイルをアップロードしました。これらのファイルについて質問できます。`);

                } catch (error) {
                    console.error('Upload error:', error);
                    this.hideUploadProgress();
                    alert(`ファイルアップロードエラー: ${error.message}`);
                }
            }

            showUploadProgress() {
                const progressDiv = document.getElementById('uploadProgress');
                const progressBar = document.getElementById('uploadProgressBar');
                const statusDiv = document.getElementById('uploadStatus');

                progressDiv?.classList.remove('hidden');

                // アニメーション効果
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 15;
                    if (progress > 90) progress = 90;
                    progressBar.style.width = `${progress}%`;
                    statusDiv.textContent = `ファイルをアップロード中... ${Math.round(progress)}%`;

                    if (progress >= 90) {
                        clearInterval(interval);
                        statusDiv.textContent = 'ファイル処理中...';
                    }
                }, 200);

                this.uploadInterval = interval;
            }

            hideUploadProgress() {
                if (this.uploadInterval) {
                    clearInterval(this.uploadInterval);
                    this.uploadInterval = null;
                }

                const progressDiv = document.getElementById('uploadProgress');
                const progressBar = document.getElementById('uploadProgressBar');

                // 完了アニメーション
                progressBar.style.width = '100%';
                setTimeout(() => {
                    progressDiv?.classList.add('hidden');
                    progressBar.style.width = '0%';
                }, 500);
            }

            removeFile(fileId) {
                // TODO: API呼び出しで実際にファイルを削除
                sessionManager.removeFile(fileId);
                this.render();
            }

            // ユーティリティメソッド
            getFileIcon(filename) {
                const ext = filename.split('.').pop().toLowerCase();
                const icons = {
                    'pdf': '📄',
                    'docx': '📝',
                    'doc': '📝',
                    'xlsx': '📊',
                    'xls': '📊',
                    'pptx': '📽️',
                    'ppt': '📽️',
                    'txt': '📄',
                    'csv': '📊',
                    'json': '🗂️',
                    'png': '🖼️',
                    'jpg': '🖼️',
                    'jpeg': '🖼️',
                    'gif': '🖼️'
                };
                return icons[ext] || '📎';
            }

            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            // 既存のメソッド（ログイン、チャット等）は基本的に同じ
            async handleLogin() {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const loginButton = document.getElementById('loginButton');
                const errorDiv = document.getElementById('loginError');

                if (!username || !password) return;

                loginButton.disabled = true;
                loginButton.innerHTML = '<div class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin mr-2"></div>認証中...';
                errorDiv.classList.add('hidden');

                try {
                    this.user = await authManager.signIn(username, password);
                    console.log('Login successful:', this.user);

                    // 新しいセッションを作成
                    sessionManager.createNewSession();

                    this.render();
                } catch (error) {
                    console.error('Login error:', error);
                    let errorMessage = 'ログインに失敗しました。';

                    if (error.code === 'UserNotConfirmedException') {
                        errorMessage = 'アカウントが確認されていません。';
                    } else if (error.code === 'NotAuthorizedException') {
                        errorMessage = 'ユーザー名またはパスワードが正しくありません。';
                    } else if (error.code === 'UserNotFoundException') {
                        errorMessage = 'ユーザーが存在しません。';
                    } else if (error.message) {
                        errorMessage = error.message;
                    }

                    errorDiv.textContent = errorMessage;
                    errorDiv.classList.remove('hidden');
                } finally {
                    loginButton.disabled = false;
                    loginButton.textContent = 'ログイン';
                }
            }

            handleLogout() {
                authManager.signOut();
                this.user = null;
                this.messages = [];
                sessionManager.currentSession = null;
                sessionManager.uploadedFiles = [];
                this.render();
            }

            async handleSendMessage() {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();

                if (!message || this.isLoading) return;

                // 現在のセッションのファイル情報を取得
                const attachments = sessionManager.uploadedFiles.map(file => ({
                    file_id: file.file_id,
                    filename: file.filename,
                    size: file.size || 0
                }));

                // ユーザーメッセージを追加（ファイル情報付き）
                this.addMessage('user', message, null, null, false, attachments);
                input.value = '';
                this.isLoading = true;
                this.render();

                try {
                    console.log('Sending message with session:', sessionManager.currentSession?.id);

                    // Enhanced Chat APIを呼び出し（セッション情報付き）
                    const requestBody = {
                        message: message,
                        session_id: sessionManager.currentSession?.id
                    };

                    const response = await authManager.authenticatedRequest(
                        `${CONFIG.apiGatewayUrl}chat`,
                        {
                            method: 'POST',
                            body: JSON.stringify(requestBody)
                        }
                    );

                    console.log('Enhanced Chat API Response:', response.status, response.statusText);

                    if (response.ok) {
                        const data = await response.json();
                        console.log('Enhanced Chat API Data:', data);

                        const aiResponse = data.answer || '無機RAGから応答がありませんでした。';
                        const sourceLinks = data.source_links || [];
                        const isRag = data.is_rag_response || false;

                        this.addMessage('assistant', aiResponse, data.model || 'Claude Sonnet 4.6', sourceLinks, isRag);
                    } else if (response.status === 401) {
                        // 認証エラーの場合はログアウト
                        this.addMessage('error', '認証エラーが発生しました。再度ログインしてください。');
                        setTimeout(() => this.handleLogout(), 2000);
                    } else {
                        const errorText = await response.text();
                        console.error('API Error:', response.status, errorText);
                        this.addMessage('error', `API呼び出しエラー (HTTP ${response.status}): ${errorText}`);
                    }
                } catch (error) {
                    console.error('Chat error:', error);
                    let errorMessage = `ネットワークエラー: ${error.message}`;

                    if (error.message.includes('認証トークン')) {
                        errorMessage = '認証トークンが無効です。再度ログインしてください。';
                        setTimeout(() => this.handleLogout(), 2000);
                    }

                    this.addMessage('error', errorMessage);
                }

                this.isLoading = false;
                this.render();
                this.scrollToBottom();
            }

            addMessage(type, content, model = null, sourceLinks = null, isRag = false, attachments = null) {
                const message = {
                    type,
                    content,
                    model,
                    sourceLinks,
                    isRag,
                    attachments,
                    timestamp: new Date()
                };
                this.messages.push(message);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            scrollToBottom() {
                const chatArea = document.getElementById('chatArea');
                if (chatArea) {
                    chatArea.scrollTop = chatArea.scrollHeight;
                }
            }
        }

        // グローバル参照（ファイル削除等で使用）
        let app;

        // アプリケーション初期化
        document.addEventListener('DOMContentLoaded', () => {
            app = new App();
        });
    </script>
</body>
