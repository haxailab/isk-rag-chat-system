<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISK RAG チャットシステム (Simple Test)</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow-md">
                <div class="text-center">
                    <h1 class="text-2xl font-bold text-gray-900 mb-4">
                        ISK RAG チャットシステム
                    </h1>
                    <div class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm inline-block mb-4">
                        Simple Test Version
                    </div>
                    <p class="text-gray-600 mb-6">
                        システムテスト中...
                    </p>
                    <div class="space-y-4">
                        <div class="flex items-center justify-center space-x-2">
                            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                            <span class="text-sm text-gray-700">HTML読み込み: OK</span>
                        </div>
                        <div id="js-test" class="flex items-center justify-center space-x-2">
                            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                            <span class="text-sm text-gray-700">JavaScript: テスト中...</span>
                        </div>
                        <div id="api-test" class="flex items-center justify-center space-x-2">
                            <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                            <span class="text-sm text-gray-700">API接続: 待機中</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript テスト
        document.addEventListener('DOMContentLoaded', function() {
            console.log('JavaScript loaded successfully');

            // JS テスト結果更新
            const jsTest = document.getElementById('js-test');
            jsTest.innerHTML = '<div class="w-3 h-3 bg-green-500 rounded-full"></div><span class="text-sm text-gray-700">JavaScript: OK</span>';

            // API テスト
            testApi();
        });

        async function testApi() {
            const apiTest = document.getElementById('api-test');
            try {
                const response = await fetch('https://jztwgpdqe8.execute-api.ap-northeast-1.amazonaws.com/prod/health');
                const data = await response.json();

                if (response.ok) {
                    apiTest.innerHTML = '<div class="w-3 h-3 bg-green-500 rounded-full"></div><span class="text-sm text-gray-700">API接続: OK (' + data.status + ')</span>';

                    // 成功したら本格版へのリンクを表示
                    setTimeout(() => {
                        showFullVersion();
                    }, 2000);
                } else {
                    apiTest.innerHTML = '<div class="w-3 h-3 bg-red-500 rounded-full"></div><span class="text-sm text-gray-700">API接続: エラー</span>';
                }
            } catch (error) {
                console.error('API Test Error:', error);
                apiTest.innerHTML = '<div class="w-3 h-3 bg-red-500 rounded-full"></div><span class="text-sm text-gray-700">API接続: 失敗</span>';
            }
        }

        function showFullVersion() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="min-h-screen flex items-center justify-center">
                    <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow-md text-center">
                        <h1 class="text-2xl font-bold text-green-600 mb-4">
                            ✅ システムテスト完了
                        </h1>
                        <div class="space-y-4">
                            <div class="bg-green-50 p-4 rounded-lg">
                                <p class="text-green-800 font-semibold">全システム正常動作</p>
                                <p class="text-green-600 text-sm mt-2">
                                    HTML、JavaScript、API接続すべて成功
                                </p>
                            </div>
                            <button onclick="window.location.href='/full'" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                                完全版アプリに移行
                            </button>
                            <p class="text-xs text-gray-500">
                                問題が解決されました。完全版をデプロイします。
                            </p>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
