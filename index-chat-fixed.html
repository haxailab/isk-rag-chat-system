<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISK RAG チャットシステム (Simple)</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .chat-container {
            height: calc(100vh - 180px);
        }
        .message-bubble {
            max-width: 80%;
            word-wrap: break-word;
        }
        .version-badge {
            background: linear-gradient(45deg, #4f46e5, #06b6d4);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root">
        <!-- 初期読み込み画面 -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                <p class="text-gray-600">ISK RAG チャットシステムを読み込み中...</p>
            </div>
        </div>
    </div>

    <!-- AWS SDK -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1563.0.min.js"></script>
    <!-- 外部ライブラリ -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 設定
        const CONFIG = {
            region: 'ap-northeast-1',
            userPoolId: 'ap-northeast-1_TRqpo3mOq',
            userPoolClientId: '7negaj2hgsaj15kat1v6n4a69r',
            apiGatewayUrl: 'https://jztwgpdqe8.execute-api.ap-northeast-1.amazonaws.com/prod/'
        };

        // Cognito認証サービス
        const CognitoAuth = {
            cognitoUser: null,
            idToken: null,

            async signIn(username, password) {
                return new Promise((resolve, reject) => {
                    // AWS Cognito設定
                    AWS.config.region = CONFIG.region;

                    const poolData = {
                        UserPoolId: CONFIG.userPoolId,
                        ClientId: CONFIG.userPoolClientId
                    };

                    const userPool = new AWSCognito.CognitoIdentityServiceProvider.CognitoUserPool(poolData);

                    const authenticationData = {
                        Username: username,
                        Password: password,
                    };

                    const authenticationDetails = new AWSCognito.CognitoIdentityServiceProvider.AuthenticationDetails(authenticationData);

                    const userData = {
                        Username: username,
                        Pool: userPool
                    };

                    const cognitoUser = new AWSCognito.CognitoIdentityServiceProvider.CognitoUser(userData);
                    this.cognitoUser = cognitoUser;

                    cognitoUser.authenticateUser(authenticationDetails, {
                        onSuccess: (result) => {
                            this.idToken = result.getIdToken().getJwtToken();
                            const user = {
                                username: username,
                                email: result.getIdToken().payload.email,
                                token: this.idToken
                            };
                            localStorage.setItem('authUser', JSON.stringify(user));
                            localStorage.setItem('idToken', this.idToken);
                            resolve(user);
                        },
                        onFailure: (err) => {
                            console.error('Authentication failed:', err);
                            reject(err);
                        },
                        newPasswordRequired: (userAttributes, requiredAttributes) => {
                            // 初回ログイン時のパスワード変更が必要
                            const newPassword = prompt('新しいパスワードを入力してください（8文字以上、大文字・小文字・数字・記号を含む）:');
                            if (newPassword) {
                                cognitoUser.completeNewPasswordChallenge(newPassword, {}, {
                                    onSuccess: (result) => {
                                        this.idToken = result.getIdToken().getJwtToken();
                                        const user = {
                                            username: username,
                                            email: result.getIdToken().payload.email || username,
                                            token: this.idToken
                                        };
                                        localStorage.setItem('authUser', JSON.stringify(user));
                                        localStorage.setItem('idToken', this.idToken);
                                        resolve(user);
                                    },
                                    onFailure: (err) => {
                                        console.error('Password change failed:', err);
                                        reject(err);
                                    }
                                });
                            } else {
                                reject(new Error('新しいパスワードが必要です'));
                            }
                        }
                    });
                });
            },

            async signOut() {
                if (this.cognitoUser) {
                    this.cognitoUser.signOut();
                }
                this.cognitoUser = null;
                this.idToken = null;
                localStorage.removeItem('authUser');
                localStorage.removeItem('idToken');
            },

            getCurrentUser() {
                const saved = localStorage.getItem('authUser');
                const token = localStorage.getItem('idToken');
                if (saved && token) {
                    this.idToken = token;
                    return JSON.parse(saved);
                }
                return null;
            }
        };

        // メインアプリケーション
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                checkAuthState();
            }, []);

            const checkAuthState = () => {
                const currentUser = CognitoAuth.getCurrentUser();
                setUser(currentUser);
                setLoading(false);
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                            <p className="text-gray-600">認証状態を確認中...</p>
                        </div>
                    </div>
                );
            }

            return user ? <ChatInterface user={user} onSignOut={() => setUser(null)} /> : <LoginForm onLogin={setUser} />;
        }

        // ログインフォーム
        function LoginForm({ onLogin }) {
            const [username, setUsername] = useState('admin1775453217');
            const [password, setPassword] = useState('IskDemo123!');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                try {
                    const user = await CognitoAuth.signIn(username, password);
                    onLogin(user);
                } catch (error) {
                    console.error('Login error:', error);
                    setError(error.message || 'ログインに失敗しました。認証情報を確認してください。');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center">
                    <div className="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow-md">
                        <div className="text-center">
                            <h2 className="text-2xl font-bold text-gray-900">ISK RAG チャットシステム</h2>
                            <div className="mt-2 version-badge text-white px-3 py-1 rounded-full text-sm inline-block">
                                Simple Version + Real Auth
                            </div>
                            <p className="mt-2 text-sm text-gray-600">
                                Claude Sonnet 4 による高品質AI対話
                            </p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">
                                    ユーザー名
                                </label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="例: admin1775453217"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">
                                    パスワード
                                </label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="パスワードを入力"
                                    required
                                />
                            </div>
                            {error && (
                                <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded text-sm">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
                            >
                                {loading ? 'ログイン中...' : 'ログイン'}
                            </button>
                        </form>
                        <div className="text-center">
                            <div className="bg-blue-50 p-3 rounded-lg text-sm">
                                <p className="font-medium text-blue-800">認証情報（自動入力済み）</p>
                                <p className="text-blue-600 text-xs">初回ログイン時は新しいパスワード設定が必要</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // チャットインターフェース
        function ChatInterface({ user, onSignOut }) {
            const [messages, setMessages] = useState([]);
            const [inputMessage, setInputMessage] = useState('');
            const [loading, setLoading] = useState(false);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!inputMessage.trim() || loading) return;

                const userMessage = {
                    type: 'user',
                    content: inputMessage,
                    timestamp: new Date()
                };
                setMessages(prev => [...prev, userMessage]);
                const currentMessage = inputMessage;
                setInputMessage('');
                setLoading(true);

                try {
                    console.log('Sending message to Chat API with token:', user.token ? 'Present' : 'Missing');

                    const response = await fetch(`${CONFIG.apiGatewayUrl}chat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': user.token
                        },
                        body: JSON.stringify({
                            message: currentMessage
                        })
                    });

                    console.log('Chat API Response:', response.status, response.statusText);

                    if (response.ok) {
                        const data = await response.json();
                        console.log('Chat API Data:', data);

                        const aiMessage = {
                            type: 'assistant',
                            content: data.answer || 'Claude Sonnet 4から応答がありませんでした。',
                            model: data.model || 'Claude Sonnet 4',
                            timestamp: new Date(),
                            sources: data.sources || []
                        };
                        setMessages(prev => [...prev, aiMessage]);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `HTTP ${response.status}: ${response.statusText}`);
                    }
                } catch (error) {
                    console.error('Chat error:', error);
                    const errorMessage = {
                        type: 'error',
                        content: `申し訳ございません。エラーが発生しました：${error.message}

デバッグ情報:
- ユーザー: ${user.username}
- 認証トークン: ${user.token ? '有効' : '無効'}
- メッセージ: "${currentMessage}"

システム管理者にお問い合わせください。`,
                        timestamp: new Date()
                    };
                    setMessages(prev => [...prev, errorMessage]);
                }

                setLoading(false);
            };

            const signOut = () => {
                CognitoAuth.signOut();
                onSignOut();
            };

            return (
                <div className="h-screen flex flex-col">
                    {/* ヘッダー */}
                    <header className="bg-blue-600 text-white p-4 flex justify-between items-center">
                        <div className="flex items-center space-x-4">
                            <h1 className="text-xl font-bold">ISK RAG チャットシステム</h1>
                            <div className="bg-green-500 text-xs px-2 py-1 rounded-full">
                                Claude Sonnet 4 接続中
                            </div>
                        </div>
                        <div className="flex items-center space-x-4">
                            <span className="text-sm">こんにちは、{user.username}</span>
                            <button
                                onClick={signOut}
                                className="bg-blue-500 hover:bg-blue-700 px-4 py-2 rounded text-sm"
                            >
                                ログアウト
                            </button>
                        </div>
                    </header>

                    {/* チャットエリア */}
                    <div className="flex-1 chat-container overflow-y-auto p-4 space-y-4">
                        {messages.length === 0 && (
                            <div className="text-center text-gray-500 mt-8">
                                <div className="text-lg mb-2">🤖 Claude Sonnet 4 アシスタント</div>
                                <div className="text-sm mb-4">
                                    認証完了！高品質なAI対話をお楽しみください
                                </div>
                                <div className="bg-green-50 p-4 rounded-lg max-w-md mx-auto">
                                    <p className="text-green-800 text-sm font-medium">✅ システム準備完了</p>
                                    <p className="text-green-600 text-xs mt-1">
                                        認証: {user.token ? '有効' : '無効'} | API: 接続中
                                    </p>
                                </div>
                            </div>
                        )}

                        {messages.map((message, index) => (
                            <div
                                key={index}
                                className={`flex ${message.type === 'user' ? 'justify-end' : 'justify-start'}`}
                            >
                                <div
                                    className={`message-bubble p-3 rounded-lg ${
                                        message.type === 'user'
                                            ? 'bg-blue-500 text-white'
                                            : message.type === 'error'
                                            ? 'bg-red-100 text-red-800 border border-red-200'
                                            : 'bg-white border border-gray-200 shadow-sm'
                                    }`}
                                >
                                    <div className="whitespace-pre-line">{message.content}</div>
                                    {message.model && (
                                        <div className="text-xs opacity-70 mt-1">
                                            モデル: {message.model}
                                        </div>
                                    )}
                                    {message.sources && message.sources.length > 0 && (
                                        <div className="text-xs opacity-70 mt-1">
                                            参照: {message.sources.length}件
                                        </div>
                                    )}
                                    <div className="text-xs opacity-50 mt-1">
                                        {message.timestamp.toLocaleTimeString()}
                                    </div>
                                </div>
                            </div>
                        ))}

                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-gray-200 p-3 rounded-lg message-bubble">
                                    <div className="flex items-center space-x-2">
                                        <div className="animate-spin rounded-full h-4 w-4 border-2 border-blue-500 border-t-transparent"></div>
                                        <span>Claude Sonnet 4 が回答を生成中...</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 入力エリア */}
                    <footer className="border-t bg-white p-4">
                        <form onSubmit={sendMessage} className="flex space-x-2">
                            <input
                                type="text"
                                value={inputMessage}
                                onChange={(e) => setInputMessage(e.target.value)}
                                placeholder="Claude Sonnet 4 にメッセージを送信..."
                                className="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                disabled={loading}
                            />
                            <button
                                type="submit"
                                disabled={loading || !inputMessage.trim()}
                                className="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
                            >
                                送信
                            </button>
                        </form>
                        <div className="text-xs text-gray-500 mt-2 text-center">
                            🚀 Claude Sonnet 4 直接接続 | 認証: 有効 | ISK RAG System v1.0
                        </div>
                    </footer>
                </div>
            );
        }

        // アプリケーションをレンダリング
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <!-- Cognito SDK -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1563.0.min.js"></script>
    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.12/dist/amazon-cognito-identity.min.js"></script>
</body>
</html>
